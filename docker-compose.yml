services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # Build from the repo root: the API imports the SDK by path
    # (`from sdk.verdant...`), so the build context must include both api/ and sdk/.
    build:
      context: .
      dockerfile: Dockerfile
    # Provide real secrets. Copy .env.example -> .env and fill it in.
    env_file:
      - .env
    environment:
      # Reach Redis over the compose network (overrides any REDIS_URL in .env).
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  # The Next.js dashboard is deployed separately (e.g. Vercel) and has no
  # Dockerfile yet. To run it here too, add dashboard/Dockerfile and uncomment:
  #
  # dashboard:
  #   build:
  #     context: ./dashboard
  #   env_file:
  #     - .env
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api

volumes:
  redis-data:
