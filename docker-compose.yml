services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis-data:
